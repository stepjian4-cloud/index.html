<!DOCTYPE html>
<html>
<head>
    <title>Pixel Survivor: Elite Edition</title>
    <style>
        body { background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #game-container { position: relative; width: 900px; height: 650px; }
        canvas { background: #0a0a0a; border: 4px solid #444; display: block; cursor: crosshair; }
        
        /* 云端 UI */
        .cloud-ui { position: absolute; top: 10px; left: 10px; z-index: 300; display: flex; gap: 15px; align-items: flex-start; }
        #login-btn { background: #4285F4; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .leaderboard-mini { background: rgba(0,0,0,0.7); border: 1px solid #444; padding: 10px; color: #aaa; font-size: 12px; width: 150px; border-radius: 5px; }
        .leaderboard-mini h4 { margin: 0 0 5px 0; color: #f1c40f; text-align: center; }

        /* 全局 Overlay */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; color: white; z-index: 100; padding: 30px; box-sizing: border-box; }
        #shop-overlay { background: rgba(0,0,0,0.98); }
        .shop-header { width: 95%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #444; padding-bottom: 15px; }
        .shop-header h1 { font-size: 42px; color: #f1c40f; margin: 0; letter-spacing: 2px; }
        .points-info { font-size: 36px; color: #2ecc71; font-weight: bold; background: #222; padding: 5px 25px; border-radius: 10px; border: 1px solid #555; }

        #pause-overlay { background: rgba(0,0,0,0.85); justify-content: center; cursor: pointer; }
        #pause-overlay h2 { font-size: 64px; color: #f1c40f; margin-bottom: 10px; letter-spacing: 5px; }
        #pause-overlay p { font-size: 24px; color: #aaa; }

        .cards-container { display: flex; gap: 20px; justify-content: center; width: 100%; height: 440px; }
        .skill-card { width: 280px; height: 100%; background: #1a1a1a; border: 3px solid #444; border-radius: 20px; display: flex; flex-direction: column; padding: 25px; transition: 0.2s; box-sizing: border-box; cursor: pointer; }
        .skill-card:hover { transform: translateY(-10px); border-color: #fff; background: #252525; }
        .skill-card.sold-out { opacity: 0.1; filter: grayscale(1); pointer-events: none; }

        .rarity-tag { font-size: 14px; font-weight: bold; padding: 4px 12px; border-radius: 6px; align-self: flex-start; margin-bottom: 15px; text-transform: uppercase; }
        .skill-name { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .skill-desc { font-size: 17px; line-height: 1.5; color: #ccc; flex-grow: 1; }
        .skill-price { font-size: 26px; color: #f39c12; font-weight: bold; text-align: center; margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 10px; }

        /* RARITY STYLES */
        .r-50 { background: #7f8c8d; color: #000; } 
        .r-25 { background: #3498db; color: #fff; } 
        .r-20 { background: #9b59b6; color: #fff; } 
        .r-10 { background: #f1c40f; color: #000; } 
        .r-5  { background: #e74c3c; color: #fff; } 
        .r-1  { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; } 

        .shop-footer { width: 95%; display: flex; justify-content: space-between; align-items: center; margin-top: 35px; }
        .btn { padding: 18px 45px; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; }
        .refresh-btn { background: #34495e; color: white; border: 2px solid #5d6d7e; }
        .confirm-btn { background: #27ae60; color: white; box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4); }
        .insufficient { color: #e74c3c !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="cloud-ui">
            <button id="login-btn" onclick="login()">GMAIL LOGIN</button>
            <div class="leaderboard-mini">
                <h4>TOP SURVIVORS</h4>
                <div id="rank-list">Syncing...</div>
            </div>
        </div>

        <div id="shop-overlay" class="overlay">
            <div class="shop-header">
                <h1>ARMORY & LOGISTICS</h1>
                <div class="points-info">PT: <span id="points-display">0</span></div>
            </div>
            <div class="cards-container" id="cards-container"></div>
            <div class="shop-footer">
                <div style="display:flex; flex-direction:column; gap:5px">
                    <button id="refresh-btn" class="btn refresh-btn">REROLL SHOP</button>
                    <span id="refresh-count" style="color:#aaa; font-size:18px">REROLLS LEFT: 5/5</span>
                </div>
                <button id="confirm-btn" class="btn confirm-btn">CONFIRM & DEPLOY →</button>
            </div>
        </div>

        <div id="pause-overlay" class="overlay">
            <h2>PAUSED</h2>
            <p>Click or Press ESC to Resume Combat</p>
        </div>

        <canvas id="game" width="900" height="650"></canvas>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBimAEB2clwCHEq8Ol7MDAulTYjalaFCos",
        authDomain: "game-c7a53.firebaseapp.com",
        projectId: "game-c7a53",
        storageBucket: "game-c7a53.firebasestorage.app",
        messagingSenderId: "495592663876",
        appId: "1:495592663876:web:354f9f76917fb63cea8511",
        measurementId: "G-WPL8WPN67X"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.login = () => signInWithPopup(auth, new GoogleAuthProvider());

    // 【修改点 1：登录拉取存档】
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-btn').innerText = user.displayName.split(' ')[0].toUpperCase();
            const snap = await getDoc(doc(db, "pixel_stats", user.uid));
            if(snap.exists()) {
                player.highScore = snap.data().highScore || 0;
            }
        }
    });

    onSnapshot(query(collection(db, "pixel_stats"), orderBy("highScore", "desc"), limit(5)), (s) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = '';
        s.forEach(d => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between"><span>${d.data().name}</span><b>${d.data().highScore}</b></div>`;
        });
    });

    // 【修改点 2：同步逻辑更新】
    async function syncCloud() {
        if (auth.currentUser) {
            const currentBest = Math.max(player.score, player.highScore || 0);
            await setDoc(doc(db, "pixel_stats", auth.currentUser.uid), {
                name: auth.currentUser.displayName.split(' ')[0],
                highScore: currentBest,
                lastRound: round
            }, { merge: true });
            player.highScore = currentBest;
        }
    }

    // --- 游戏原始逻辑 ---
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const shopOverlay = document.getElementById("shop-overlay");
    const pauseOverlay = document.getElementById("pause-overlay");
    const pointsDisplay = document.getElementById("points-display");
    const cardsContainer = document.getElementById("cards-container");
    const refreshBtn = document.getElementById("refresh-btn");
    const refreshCountText = document.getElementById("refresh-count");
    const confirmBtn = document.getElementById("confirm-btn");

    let gameState = "BATTLE"; 
    let player = { 
        x: 450, y: 325, score: 0, hp: 100, maxHp: 100, shield: 0,
        baseDamage: 0.6, critRate: 0.05, dodgeRate: 0.01,
        fireRate: 200, pierce: 1, range: 750, regen: 0, dartLevel: 0,
        highScore: 0
    };

    let enemies = [], bullets = [], darts = [], keys = {};
    let round = 1, timeLeft = 20, lastTick = Date.now(), refreshUsed = 0;
    const refreshCosts = [1, 2, 5, 10, 20];
    let tempBuff = { active: false, fr: 1, reg: 0 };

    const allSkills = [
        { n: "Tactical Repair", d: "Instantly restore 20 HP. Under massive damage pressure, survival is the only objective.", v: () => player.hp = Math.min(player.maxHp, player.hp + 20), r: 50, p: 10 },
        { n: "Energy Shield", d: "Gain 20 Shield capacity. Shields absorb huge impacts, acting as a vital safety buffer.", v: () => player.shield += 20, r: 50, p: 10 },
        { n: "Cellular Regen", d: "Recover 1 HP every second. Provides essential sustainability during long skirmishes.", v: () => player.regen += 1, r: 25, p: 20 },
        { n: "Critical Analysis", d: "Crit Rate +8%. Target structural weaknesses to deal 200% lethal damage.", v: () => player.critRate += 0.08, r: 25, p: 20 },
        { n: "Overclock Mod", d: "Fire Rate +15%. High volume of fire is the ultimate solution to any enemy swarm.", v: () => player.fireRate *= 0.85, r: 20, p: 25 },
        { n: "Railgun Ammo", d: "Pierce +1. Bullets will now travel through multiple enemies with devastating effect.", v: () => player.pierce += 1, r: 20, p: 25 },
        { n: "Predator Darts", d: "Activate auto-tracking darts. Targets the toughest enemies every 10 seconds.", v: () => player.dartLevel += 1, r: 10, p: 30 },
        { n: "Titan Core", d: "Max HP +30 and full heal. Upgrades your chassis to endure the most hostile environments.", v: () => { player.maxHp += 30; player.hp = player.maxHp; }, r: 10, p: 30 },
        { n: "Berserker Drive", d: "[ROUND ONLY] Fire Rate x5 & massive regen. Unleash absolute carnage.", v: () => { tempBuff.fr = 5; tempBuff.reg = 3; tempBuff.active = true; }, r: 5, p: 35 },
        { n: "God Protocol", d: "Ultimate augmentation. Drastically improves Range, Pierce, and Base Damage.", v: () => { player.range *= 1.5; player.pierce += 2; player.baseDamage += 0.4; }, r: 1, p: 40 }
    ];

    function togglePause() {
        if (gameState === "SHOP" || gameState === "TRANSITION") return;
        if (gameState === "BATTLE") {
            gameState = "PAUSED"; pauseOverlay.style.display = "flex";
        } else if (gameState === "PAUSED") {
            gameState = "BATTLE"; pauseOverlay.style.display = "none"; lastTick = Date.now();
        }
    }

    pauseOverlay.onclick = togglePause;
    window.onkeydown = e => { keys[e.code] = true; if (e.code === "Escape") togglePause(); };
    window.onkeyup = e => keys[e.code] = false;

    function getRandomSkill() {
        const roll = Math.random() * 100;
        let rarity;
        if (roll < 1) rarity = 1; else if (roll < 6) rarity = 5; else if (roll < 16) rarity = 10;
        else if (roll < 36) rarity = 20; else if (roll < 61) rarity = 25; else rarity = 50;
        let pool = allSkills.filter(s => s.r === rarity);
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function updateShopUI() {
        pointsDisplay.innerText = player.score;
        cardsContainer.innerHTML = "";
        for (let i = 0; i < 3; i++) {
            const skill = getRandomSkill();
            const card = document.createElement("div");
            card.className = "skill-card";
            const canAfford = player.score >= skill.p;
            card.innerHTML = `<div class="rarity-tag r-${skill.r}">${skill.r === 1 ? 'ULTIMATE' : skill.r <= 10 ? 'LEGEND' : 'STANDARD'}</div><div class="skill-name">${skill.n}</div><div class="skill-desc">${skill.d}</div><div class="skill-price ${!canAfford ? 'insufficient' : ''}">COST: ${skill.p} PT</div>`;
            if (canAfford) {
                card.onclick = (e) => {
                    e.stopPropagation(); player.score -= skill.p; skill.v();
                    card.classList.add("sold-out"); card.onclick = null;
                    pointsDisplay.innerText = player.score; updateShopButtons();
                };
            }
            cardsContainer.appendChild(card);
        }
        updateShopButtons();
    }

    function updateShopButtons() {
        const cost = refreshCosts[refreshUsed] || 999;
        refreshBtn.innerText = `REROLL (${cost}PT)`;
        refreshBtn.disabled = refreshUsed >= 5 || player.score < cost;
        refreshCountText.innerText = `REROLLS LEFT: ${5 - refreshUsed}/5`;
    }

    refreshBtn.onclick = () => {
        const cost = refreshCosts[refreshUsed];
        if (player.score >= cost) { player.score -= cost; refreshUsed++; updateShopUI(); }
    };

    confirmBtn.onclick = () => {
        shopOverlay.style.display = "none"; gameState = "TRANSITION";
        setTimeout(() => { 
            enemies = []; bullets = []; darts = []; timeLeft = 20; refreshUsed = 0; tempBuff.active = false;
            gameState = "BATTLE"; lastTick = Date.now();
        }, 800);
    };

    function spawnEnemy() {
        if (gameState !== "BATTLE" || Math.random() > 0.75) return;
        let x, y, side = Math.floor(Math.random()*4);
        if(side==0){x=-30; y=Math.random()*650;} else if(side==1){x=930; y=Math.random()*650;}
        else if(side==2){x=Math.random()*900; y=-30;} else {x=Math.random()*900; y=680;}
        let hp = (round >= 5 && Math.random() < 0.3) ? 2 : 1;
        enemies.push({ id: Math.random(), x, y, hp, maxHp: hp, speed: 0.8 + (round*0.06), atkTimer: 0 });
    }

    let isMouseDown = false, mousePos = {x:0, y:0}, lastShot = 0;
    canvas.onmousedown = () => { if (gameState === "PAUSED") togglePause(); else isMouseDown = true; };
    window.onmouseup = () => isMouseDown = false;
    canvas.onmousemove = e => { const r = canvas.getBoundingClientRect(); mousePos.x = e.clientX-r.left; mousePos.y = e.clientY-r.top; };

    function update() {
        if (gameState !== "BATTLE") return;
        let now = Date.now();
        if (now - lastTick >= 1000) {
            timeLeft--; lastTick = now;
            player.hp = Math.min(player.maxHp, player.hp + player.regen + (tempBuff.active ? tempBuff.reg : 0));
            if (timeLeft <= 0) {
                syncCloud(); // 同步
                gameState = "SHOP"; round++; shopOverlay.style.display = "flex"; updateShopUI();
                return;
            }
        }

        let fr = player.fireRate / (tempBuff.active ? tempBuff.fr : 1);
        if (isMouseDown && now - lastShot > fr) {
            let dx = mousePos.x - player.x, dy = mousePos.y - player.y, dist = Math.sqrt(dx*dx+dy*dy);
            bullets.push({ x: player.x, y: player.y, sx: (dx/dist)*18, sy: (dy/dist)*18, p: player.pierce, d: 0, hit: [] });
            lastShot = now;
        }

        if(keys["KeyW"]) player.y -= 4.5; if(keys["KeyS"]) player.y += 4.5;
        if(keys["KeyA"]) player.x -= 4.5; if(keys["KeyD"]) player.x += 4.5;

        for(let i=bullets.length-1; i>=0; i--) {
            let b = bullets[i]; b.x += b.sx; b.y += b.sy; b.d += 18;
            if(b.d > player.range) { bullets.splice(i,1); continue; }
            enemies.forEach(e => {
                if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20 && !b.hit.includes(e.id)) {
                    e.hp -= player.baseDamage * (Math.random()<player.critRate?2:1);
                    b.hit.push(e.id); b.p--;
                }
            });
            if(b.p <= 0) bullets.splice(i,1);
        }

        enemies.forEach((e, i) => {
            let dx = player.x-e.x, dy = player.y-e.y, dist = Math.sqrt(dx*dx+dy*dy);
            e.x += (dx/dist)*e.speed; e.y += (dy/dist)*e.speed;
            if (dist < 22 && now - e.atkTimer > 500) {
                if (Math.random() > player.dodgeRate) {
                    if (player.shield > 0) player.shield = Math.max(0, player.shield - 20);
                    else player.hp -= 4.0 * e.maxHp;
                }
                e.atkTimer = now;
            }
            if (e.hp <= 0) { player.score += e.maxHp; enemies.splice(i, 1); }
        });
        if (player.hp <= 0) { syncCloud(); alert("MISSION FAILED! Final Score: " + player.score); location.reload(); }
    }

    function draw() {
        ctx.clearRect(0,0,900,650);
        if (gameState === "SHOP") return;
        bullets.forEach(b => { ctx.fillStyle="#f1c40f"; ctx.fillRect(b.x, b.y, 6, 6); });
        enemies.forEach(e => {
            ctx.fillStyle = e.maxHp > 1 ? "#9b59b6" : "#2ecc71";
            ctx.fillRect(e.x, e.y, 20, 20);
            ctx.fillStyle="#333"; ctx.fillRect(e.x, e.y-12, 20, 5);
            ctx.fillStyle="#f00"; ctx.fillRect(e.x, e.y-12, 20*(e.hp/e.maxHp), 5);
            ctx.fillStyle="#fff"; ctx.font="bold 12px Arial"; ctx.fillText(Math.ceil(e.hp), e.x, e.y-18);
        });
        ctx.fillStyle="#3498db"; ctx.fillRect(player.x, player.y, 20, 20);
        ctx.fillStyle="#fff"; ctx.font="bold 20px monospace";
        // 【修改点 3：UI 展示最高分】
        ctx.fillText(`WAVE: ${round} | PT: ${player.score} | BEST: ${player.highScore}`, 20, 35);
        ctx.fillStyle="#333"; ctx.fillRect(20, 55, 250, 18);
        ctx.fillStyle="#f44"; ctx.fillRect(20, 55, 250*(player.hp/player.maxHp), 18);
        ctx.fillStyle="#fff"; ctx.font="bold 14px Arial"; ctx.fillText(`HP: ${Math.ceil(player.hp)} / ${player.maxHp}`, 280, 70);
        if(player.shield > 0) {
            ctx.fillStyle="#068"; ctx.fillRect(20, 80, 250, 12);
            ctx.fillStyle="#0df"; ctx.fillRect(20, 80, Math.min(250, (player.shield/100)*250), 12);
        }
        if (gameState === "TRANSITION") {
            ctx.fillStyle="rgba(0,0,0,0.8)"; ctx.fillRect(0,0,900,650);
            ctx.fillStyle="#fff"; ctx.font="bold 70px Arial"; ctx.textAlign="center";
            ctx.fillText("ROUND " + round, 450, 325); ctx.textAlign="left";
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    setInterval(spawnEnemy, 400);
    loop();
</script>
</body>
</html>
