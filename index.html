<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SURVIVE - Horror Survival</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #game-container { position: relative; width: 900px; height: 650px; background: #0a0a0a; border: 4px solid #222; }
        canvas { display: block; background: #000; cursor: crosshair; }

        /* 主界面样式 */
        .menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex; flex-direction: column; z-index: 200;
        }
        .main-title { 
            font-family: 'Creepster', cursive; font-size: 150px; color: #8b0000; 
            text-align: center; margin-top: 80px; text-shadow: 0 0 20px #ff0000;
            animation: flicker 3s infinite;
        }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } 80% { opacity: 0.9; } }

        .player-stats-ui { position: absolute; top: 20px; left: 20px; font-size: 20px; color: #aaa; }
        .leaderboard-ui { position: absolute; top: 120px; left: 20px; width: 180px; font-size: 14px; color: #666; border-left: 2px solid #400; padding-left: 10px; }
        
        .menu-buttons { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
        .btn-main { background: none; border: none; color: white; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-start { font-family: 'Creepster', cursive; font-size: 80px; color: #fff; }
        .btn-start:hover { color: #ff0000; transform: scale(1.1); }
        .btn-armory { font-size: 30px; color: #888; border-bottom: 2px solid #444; padding: 0; }
        .btn-armory:hover { color: #fff; border-color: #fff; }

        /* 武器库样式 */
        #armory-overlay { background: rgba(0,0,0,0.95); padding: 50px; box-sizing: border-box; }
        .weapon-list { display: flex; gap: 20px; margin-top: 50px; justify-content: center; }
        .weapon-card { 
            width: 200px; height: 280px; background: #111; border: 2px solid #333; 
            border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s;
        }
        .weapon-card.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .weapon-card.selected { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .weapon-card:not(.locked):hover { border-color: #fff; cursor: pointer; }
        .weapon-img { width: 150px; height: 80px; background: #222; margin: 20px 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #444; border: 1px solid #333; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="main-menu" class="menu-overlay">
            <div class="player-stats-ui">
                <div id="user-display" style="color:#f1c40f; margin-bottom: 5px;">GUEST_MODE</div>
                <div>LEVEL: <span id="ui-level">1</span> | HIGH SCORE: <span id="ui-hi">0</span></div>
                <button id="login-btn" onclick="login()" style="margin-top:10px; background:#4285F4; color:white; border:none; padding:5px 15px; border-radius:3px; cursor:pointer;">SIGN IN WITH GOOGLE</button>
            </div>

            <div class="leaderboard-ui">
                <div style="font-family:'Creepster'; font-size:24px; color:#8b0000; margin-bottom:10px">RANKINGS</div>
                <div id="rank-content">Syncing...</div>
            </div>

            <h1 class="main-title">SURVIVE</h1>
            
            <div class="menu-buttons">
                <button class="btn-main btn-armory" onclick="openArmory()">ARMORY</button>
                <button class="btn-main btn-start" onclick="startGame()">START</button>
            </div>
        </div>

        <div id="armory-overlay" class="menu-overlay hidden">
            <h1 style="text-align:center; font-family:'Creepster'; font-size:60px; color:#8b0000;">WEAPON CACHE</h1>
            <div class="weapon-list" id="weapon-list"></div>
            <button class="btn-main btn-armory" style="margin: 40px auto; display:block;" onclick="closeArmory()">BACK TO MENU</button>
        </div>

        <canvas id="game" width="900" height="650"></canvas>
    </div>

<script type="module">
    // --- 1. Firebase 初始化 ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBimAEB2clwCHEq8Ol7MDAulTYjalaFCos",
        authDomain: "game-c7a53.firebaseapp.com",
        projectId: "game-c7a53",
        storageBucket: "game-c7a53.firebasestorage.app",
        messagingSenderId: "495592663876",
        appId: "1:495592663876:web:354f9f76917fb63cea8511",
        measurementId: "G-WPL8WPN67X"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- 2. 核心数据 ---
    let saveData = {
        level: 1,
        highScore: 0,
        currentWeapon: 'M4A1',
        name: 'GUEST'
    };

    const WEAPONS = {
        'M4A1': { name: 'M4A1', req: 1, color: '#f1c40f', fr: 150 },
        'MP5': { name: 'MP5', req: 2, color: '#2ecc71', fr: 80 }
    };

    // --- 3. Firebase 交互 ---
    window.login = () => signInWithPopup(auth, new GoogleAuthProvider());

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('user-display').innerText = user.displayName.toUpperCase();
            document.getElementById('login-btn').classList.add('hidden');
            const docRef = doc(db, "players", user.uid);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                saveData = snap.data();
            } else {
                saveData.name = user.displayName;
                await saveToCloud();
            }
            refreshUI();
        }
    });

    async function saveToCloud() {
        if (auth.currentUser) {
            await setDoc(doc(db, "players", auth.currentUser.uid), saveData, { merge: true });
        }
    }

    // 实时排行榜逻辑
    onSnapshot(query(collection(db, "players"), orderBy("highScore", "desc"), limit(5)), (snap) => {
        const root = document.getElementById('rank-content');
        root.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            root.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${(data.name || "Unknown").split(' ')[0]}</span>
                <span style="color:#8b0000">${data.highScore}</span>
            </div>`;
        });
    });

    // --- 4. 武器库逻辑 (完全还原 UI) ---
    window.openArmory = () => {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('armory-overlay').classList.remove('hidden');
        renderArmory();
    }

    window.closeArmory = () => {
        document.getElementById('armory-overlay').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    }

    function renderArmory() {
        const list = document.getElementById('weapon-list');
        list.innerHTML = '';
        Object.keys(WEAPONS).forEach(key => {
            const w = WEAPONS[key];
            const isUnlocked = saveData.level >= w.req;
            const isSelected = saveData.currentWeapon === key;
            
            const card = document.createElement('div');
            card.className = `weapon-card ${!isUnlocked ? 'locked' : ''} ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `
                <h3 style="margin:0; color:${isUnlocked?'#fff':'#444'}">${w.name}</h3>
                <div class="weapon-img" style="color:${w.color}; text-shadow: 0 0 10px ${w.color}">|||||</div>
                <p style="font-size:12px; color:${isSelected?'#f1c40f':'#666'}">${isSelected ? 'EQUIPPED' : (isUnlocked ? 'READY' : 'LVL ' + w.req + ' REQ')}</p>
            `;
            
            if (isUnlocked) {
                card.onclick = () => {
                    saveData.currentWeapon = key;
                    saveToCloud();
                    renderArmory();
                };
            }
            list.appendChild(card);
        });
    }

    function refreshUI() {
        document.getElementById('ui-level').innerText = saveData.level;
        document.getElementById('ui-hi').innerText = saveData.highScore;
    }

    // --- 5. 战斗引擎 (WASD + 鼠标瞄准) ---
    window.startGame = () => {
        document.getElementById('main-menu').classList.add('hidden');
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        
        let score = 0;
        let player = { x: 450, y: 325, angle: 0 };
        let keys = {};
        let bullets = [];
        let enemies = [];
        let lastShot = 0;
        const weapon = WEAPONS[saveData.currentWeapon];

        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        canvas.onmousemove = e => {
            const rect = canvas.getBoundingClientRect();
            player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
        };

        canvas.onmousedown = () => {
            if (Date.now() - lastShot > weapon.fr) {
                bullets.push({
                    x: player.x, y: player.y,
                    vx: Math.cos(player.angle) * 12,
                    vy: Math.sin(player.angle) * 12
                });
                lastShot = Date.now();
            }
        };

        function gameLoop() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 900, 650);

            // 移动控制
            if (keys['w']) player.y -= 3.5;
            if (keys['s']) player.y += 3.5;
            if (keys['a']) player.x -= 3.5;
            if (keys['d']) player.x += 3.5;

            // 绘制玩家 (旋转瞄准)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-15, -15, 30, 30);
            ctx.fillStyle = '#8b0000'; // 枪管
            ctx.fillRect(10, -5, 20, 10);
            ctx.restore();

            // 子弹逻辑
            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                ctx.fillStyle = weapon.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
                if (b.x < 0 || b.x > 900 || b.y < 0 || b.y > 650) bullets.splice(i, 1);
            });

            // 敌人生成与逻辑
            if (Math.random() < 0.04) {
                let side = Math.floor(Math.random()*4);
                let ex, ey;
                if(side==0){ ex=Math.random()*900; ey=-30; }
                else if(side==1){ ex=930; ey=Math.random()*650; }
                else if(side==2){ ex=Math.random()*900; ey=680; }
                else { ex=-30; ey=Math.random()*650; }
                enemies.push({ x: ex, y: ey });
            }

            enemies.forEach((e, i) => {
                let dx = player.x - e.x;
                let dy = player.y - e.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                e.x += (dx/dist) * 2;
                e.y += (dy/dist) * 2;

                ctx.fillStyle = '#400';
                ctx.fillRect(e.x-15, e.y-15, 30, 30);

                // 击中检测
                bullets.forEach((b, bi) => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 20) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                    }
                });

                // 死亡检测
                if (dist < 25) {
                    if (score > saveData.highScore) {
                        saveData.highScore = score;
                        // 100分升2级，解锁新武器
                        if(score >= 100) saveData.level = Math.max(saveData.level, 2);
                        saveToCloud();
                    }
                    alert("YOU DIED. SCORE: " + score);
                    location.reload();
                }
            });

            ctx.fillStyle = "white"; ctx.font = "30px Creepster";
            ctx.fillText("KILLS: " + score, 20, 50);
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    }
</script>
</body>
</html>
